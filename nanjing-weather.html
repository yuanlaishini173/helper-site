<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>果果家的天气预报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --glass-bg: rgba(255, 255, 255, 0.1);
    --glass-border: rgba(255, 255, 255, 0.18);
    --glass-bg-strong: rgba(255, 255, 255, 0.15);
    --text-primary: #ffffff;
    --text-secondary: rgba(255, 255, 255, 0.75);
    --text-tertiary: rgba(255, 255, 255, 0.5);
    --divider: rgba(255, 255, 255, 0.12);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    min-height: 100vh;
    color: var(--text-primary);
    overflow-x: hidden;
    transition: background 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }

  body.weather-clear-day {
    background: linear-gradient(180deg, #4a90d9 0%, #74b9ff 50%, #a8d8ff 100%);
  }

  body.weather-clear-night {
    background: linear-gradient(180deg, #0c0c1d 0%, #1a1a3e 50%, #2d2d5a 100%);
  }

  body.weather-cloudy-day {
    background: linear-gradient(180deg, #64748b 0%, #94a3b8 50%, #cbd5e1 100%);
  }

  body.weather-cloudy-night {
    background: linear-gradient(180deg, #1e293b 0%, #334155 50%, #475569 100%);
  }

  body.weather-rain {
    background: linear-gradient(180deg, #1e3a5f 0%, #2563eb 50%, #3b82f6 100%);
  }

  body.weather-snow {
    background: linear-gradient(180deg, #475569 0%, #94a3b8 50%, #cbd5e1 100%);
  }

  .weather-bg-decoration {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .bg-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: float 20s ease-in-out infinite;
  }

  .bg-blob-1 {
    width: 400px;
    height: 400px;
    background: rgba(255, 255, 255, 0.1);
    top: -100px;
    right: -100px;
    animation-delay: 0s;
  }

  .bg-blob-2 {
    width: 300px;
    height: 300px;
    background: rgba(147, 197, 253, 0.2);
    bottom: 20%;
    left: -50px;
    animation-delay: -7s;
  }

  .bg-blob-3 {
    width: 250px;
    height: 250px;
    background: rgba(167, 139, 250, 0.15);
    top: 40%;
    right: 10%;
    animation-delay: -14s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 40px;
    position: relative;
    z-index: 1;
  }

  /* 顶部区域 */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 4px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .status-bar-right {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  /* 果果头像区域 */
  .greeting-section {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 0 8px;
  }

  .greeting-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, #fce7f3, #fbcfe8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
  }

  .greeting-text {
    flex: 1;
    min-width: 0;
  }

  .greeting-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .greeting-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
  }

  .location-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px 0 4px;
  }

  .location-icon {
    width: 16px;
    height: 16px;
    opacity: 0.8;
  }

  .location-name {
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 2px;
    text-align: center;
  }

  /* 当前天气大区域 */
  .current-weather-hero {
    text-align: center;
    padding: 10px 0 30px;
  }

  .current-temp-large {
    font-size: 96px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -4px;
    position: relative;
    display: inline-block;
  }

  .current-temp-large .temp-unit {
    font-size: 32px;
    font-weight: 300;
    position: absolute;
    top: 10px;
    right: -35px;
    opacity: 0.9;
  }

  .current-condition {
    font-size: 20px;
    font-weight: 500;
    margin-top: 4px;
    opacity: 0.95;
  }

  .high-low {
    font-size: 16px;
    margin-top: 8px;
    opacity: 0.8;
  }

  .high-low .high {
    font-weight: 500;
  }

  .high-low .low {
    font-weight: 400;
    opacity: 0.7;
    margin-left: 10px;
  }

  /* 卡片通用样式 */
  .weather-card {
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .card-title {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 14px;
    text-transform: none;
  }

  .card-title-icon {
    width: 14px;
    height: 14px;
    opacity: 0.7;
  }

  /* 小时预报 */
  .hourly-scroll {
    display: flex;
    gap: 0;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .hourly-scroll::-webkit-scrollbar {
    display: none;
  }

  .hour-item {
    flex-shrink: 0;
    width: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .hour-time {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .hour-item.current .hour-time {
    color: var(--text-primary);
    font-weight: 600;
  }

  .hour-icon {
    font-size: 22px;
    line-height: 1;
  }

  .hour-temp {
    font-size: 17px;
    font-weight: 500;
  }

  .hour-precip {
    font-size: 11px;
    color: #93c5fd;
    font-weight: 500;
    min-height: 14px;
  }

  .hour-divider {
    width: 1px;
    height: 60%;
    background: var(--divider);
    align-self: center;
    flex-shrink: 0;
  }

  /* 10天预报列表 */
  .daily-list {
    display: flex;
    flex-direction: column;
  }

  .daily-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--divider);
  }

  .daily-row:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  .daily-row:first-child {
    padding-top: 0;
  }

  .daily-day {
    width: 40px;
    font-size: 15px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .daily-icon {
    font-size: 22px;
    width: 30px;
    text-align: center;
    flex-shrink: 0;
  }

  .daily-precip {
    font-size: 11px;
    color: #93c5fd;
    width: 36px;
    font-weight: 500;
    flex-shrink: 0;
  }

  .daily-temp-bar-container {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .daily-low-temp {
    font-size: 15px;
    color: var(--text-secondary);
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  .temp-bar-wrapper {
    flex: 1;
    height: 4px;
    background: var(--divider);
    border-radius: 2px;
    position: relative;
    min-width: 0;
  }

  .temp-bar {
    position: absolute;
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(to right, #60a5fa, #38bdf8, #fbbf24, #f97316);
  }

  .daily-high-temp {
    font-size: 15px;
    font-weight: 500;
    width: 32px;
    flex-shrink: 0;
  }

  /* 网格指标 */
  .grid-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 14px;
  }

  .grid-card {
    background: var(--glass-bg);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .grid-card-title {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .grid-card-title svg {
    width: 14px;
    height: 14px;
    opacity: 0.7;
  }

  .grid-card-value {
    font-size: 28px;
    font-weight: 300;
    line-height: 1.2;
  }

  .grid-card-value .unit {
    font-size: 14px;
    font-weight: 400;
    opacity: 0.6;
    margin-left: 2px;
  }

  .grid-card-sub {
    font-size: 12px;
    color: var(--text-tertiary);
    margin-top: auto;
  }

  .grid-card-bar {
    height: 4px;
    background: var(--divider);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .grid-card-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  /* 日出日落 */
  .sun-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sun-item {
    text-align: center;
    flex: 1;
  }

  .sun-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }

  .sun-time {
    font-size: 18px;
    font-weight: 500;
  }

  .sun-arc-area {
    flex: 2;
    display: flex;
    justify-content: center;
    padding: 0 10px;
  }

  .sun-arc-svg {
    width: 100%;
    max-width: 120px;
    height: 40px;
  }

  /* 底部 */
  .footer {
    text-align: center;
    padding: 20px 0 10px;
    font-size: 11px;
    color: var(--text-tertiary);
  }

  .footer a {
    color: var(--text-secondary);
    text-decoration: none;
  }

  /* 加载 */
  .loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.6s ease;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 2.5px solid rgba(255, 255, 255, 0.15);
    border-top-color: rgba(255, 255, 255, 0.8);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-bottom: 16px;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .error-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    color: #fff;
    padding: 16px 24px;
    border-radius: 14px;
    font-size: 14px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    max-width: 80%;
    text-align: center;
  }

  .error-toast.visible {
    opacity: 1;
  }

  /* 响应式 */
  @media (max-width: 380px) {
    .container {
      padding: 0 16px 32px;
    }
    .current-temp-large {
      font-size: 80px;
    }
    .current-temp-large .temp-unit {
      font-size: 28px;
      right: -30px;
    }
    .location-name {
      font-size: 30px;
    }
    .grid-card-value {
      font-size: 24px;
    }
  }
</style>
</head>
<body class="weather-clear-night">

<div class="weather-bg-decoration">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载天气...</div>
</div>

<div class="error-toast" id="errorToast">加载失败，稍后重试</div>

<div class="container">
  <!-- 状态栏 -->
  <div class="status-bar">
    <span id="statusTime">--:--</span>
    <div class="status-bar-right">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor" opacity="0.9">
        <rect x="0" y="8" width="3" height="4" rx="0.5" opacity="0.5"/>
        <rect x="5" y="5" width="3" height="7" rx="0.5" opacity="0.7"/>
        <rect x="10" y="2" width="3" height="10" rx="0.5" opacity="0.85"/>
        <rect x="15" y="0" width="3" height="12" rx="0.5"/>
      </svg>
      <svg width="22" height="12" viewBox="0 0 22 12" fill="currentColor" opacity="0.9">
        <path d="M11 2C7.5 2 4.5 3.5 2.5 6L1 4.5C3.5 1.5 7 0 11 0C15 0 18.5 1.5 21 4.5L19.5 6C17.5 3.5 14.5 2 11 2ZM11 6C9 6 7.2 6.8 6 8.2L4.5 6.7C6.3 4.6 8.5 3.5 11 3.5C13.5 3.5 15.7 4.6 17.5 6.7L16 8.2C14.8 6.8 13 6 11 6ZM11 10C10 10 9 10.4 8.3 11L11 13.5L13.7 11C13 10.4 12 10 11 10Z"/>
      </svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="currentColor" opacity="0.9">
        <rect x="0" y="1" width="20" height="10" rx="2.5" stroke="currentColor" stroke-width="1" fill="none" opacity="0.5"/>
        <rect x="2" y="3" width="16" height="6" rx="1"/>
        <rect x="21" y="3.5" width="2.5" height="5" rx="1"/>
      </svg>
    </div>
  </div>

  <!-- 果果问候 -->
  <div class="greeting-section">
    <div class="greeting-avatar">😊</div>
    <div class="greeting-text">
      <div class="greeting-title" id="greetingText">果果，晚上好</div>
      <div class="greeting-subtitle" id="greetingSub">今天过得怎么样呀</div>
    </div>
  </div>

  <!-- 位置 -->
  <div class="location-row">
    <svg class="location-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
      <circle cx="12" cy="10" r="3"></circle>
    </svg>
    <span>江悦光年</span>
  </div>

  <!-- 当前天气 -->
  <div class="current-weather-hero">
    <div class="current-temp-large">
      <span id="currentTemp">--</span><span class="temp-unit">°</span>
    </div>
    <div class="current-condition" id="weatherDesc">晴</div>
    <div class="high-low">
      最高 <span class="high" id="todayHigh">--°</span>
      <span class="low">最低 <span id="todayLow">--°</span></span>
    </div>
  </div>

  <!-- 小时预报卡片 -->
  <div class="weather-card">
    <div class="card-title">
      <svg class="card-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
      </svg>
      今日小时预报
    </div>
    <div class="hourly-scroll" id="hourlyScroll"></div>
  </div>

  <!-- 10天预报 -->
  <div class="weather-card">
    <div class="card-title">
      <svg class="card-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
      </svg>
      未来7天预报
    </div>
    <div class="daily-list" id="dailyList"></div>
  </div>

  <!-- 详细指标网格 -->
  <div class="grid-cards">
    <div class="grid-card">
      <div class="grid-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
        </svg>
        湿度
      </div>
      <div class="grid-card-value"><span id="humidity">--</span><span class="unit">%</span></div>
      <div class="grid-card-sub">相对湿度</div>
    </div>
    <div class="grid-card">
      <div class="grid-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path>
        </svg>
        风速
      </div>
      <div class="grid-card-value"><span id="windSpeed">--</span><span class="unit">km/h</span></div>
      <div class="grid-card-sub" id="windDirection">--</div>
    </div>
    <div class="grid-card">
      <div class="grid-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
        </svg>
        紫外线
      </div>
      <div class="grid-card-value"><span id="uvValue">--</span><span class="unit">级</span></div>
      <div class="grid-card-bar">
        <div class="grid-card-bar-fill" id="uvBar" style="background: linear-gradient(to right, #4ade80, #fbbf24, #f87171); width: 0%;"></div>
      </div>
      <div class="grid-card-sub" id="uvLevel">--</div>
    </div>
    <div class="grid-card">
      <div class="grid-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        能见度
      </div>
      <div class="grid-card-value"><span id="visibility">--</span><span class="unit">km</span></div>
      <div class="grid-card-sub">水平能见度</div>
    </div>
    <div class="grid-card">
      <div class="grid-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        气压
      </div>
      <div class="grid-card-value"><span id="pressure">--</span><span class="unit">hPa</span></div>
      <div class="grid-card-sub">大气压强</div>
    </div>
    <div class="grid-card">
      <div class="grid-card-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12h20"></path>
          <path d="M20 12v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-7"></path>
          <path d="M3 9l1-6h16l1 6"></path>
        </svg>
        露点
      </div>
      <div class="grid-card-value"><span id="dewPoint">--</span><span class="unit">°</span></div>
      <div class="grid-card-sub">露点温度</div>
    </div>
  </div>

  <!-- 日出日落 -->
  <div class="weather-card">
    <div class="card-title">
      <svg class="card-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
      </svg>
      日出日落
    </div>
    <div class="sun-section">
      <div class="sun-item">
        <div class="sun-label">日出</div>
        <div class="sun-time" id="sunriseTime">--:--</div>
      </div>
      <div class="sun-arc-area">
        <svg class="sun-arc-svg" viewBox="0 0 120 40" preserveAspectRatio="xMidYMid meet">
          <path d="M 5 35 Q 60 -10 115 35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="3,3"/>
          <path id="sunArcDay" d="" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
          <circle id="sunDot" cx="5" cy="35" r="4" fill="#fbbf24"/>
        </svg>
      </div>
      <div class="sun-item">
        <div class="sun-label">日落</div>
        <div class="sun-time" id="sunsetTime">--:--</div>
      </div>
    </div>
  </div>

  <!-- 空气质量 -->
  <div class="weather-card">
    <div class="card-title">
      <svg class="card-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
      </svg>
      空气质量
    </div>
    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 12px;">
      <div style="font-size: 40px; font-weight: 300;">
        <span id="aqiValue">--</span>
      </div>
      <div style="flex: 1;">
        <div id="aqiLabel" style="font-size: 18px; font-weight: 500; margin-bottom: 4px;">--</div>
        <div style="font-size: 12px; color: var(--text-tertiary);">
          PM2.5: <span id="pm25Value">--</span> · PM10: <span id="pm10Value">--</span>
        </div>
      </div>
    </div>
    <div class="grid-card-bar" style="height: 6px;">
      <div class="grid-card-bar-fill" id="aqiBar" style="background: linear-gradient(to right, #4ade80, #fbbf24, #f87171); width: 0%;"></div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    数据来源：Open-Meteo · 最后更新 <span id="lastUpdate">--</span>
  </div>
</div>

<script>
  const LOCATION_LAT = 32.080;
  const LOCATION_LON = 118.715;

  const weatherCodes = {
    0: { desc: '晴', icon: 'sunny' },
    1: { desc: '大部晴朗', icon: 'sunny' },
    2: { desc: '多云', icon: 'partly-cloudy' },
    3: { desc: '阴', icon: 'cloudy' },
    45: { desc: '雾', icon: 'fog' },
    48: { desc: '冻雾', icon: 'fog' },
    51: { desc: '小毛毛雨', icon: 'drizzle' },
    53: { desc: '毛毛雨', icon: 'drizzle' },
    55: { desc: '大毛毛雨', icon: 'drizzle' },
    61: { desc: '小雨', icon: 'rain' },
    63: { desc: '中雨', icon: 'rain' },
    65: { desc: '大雨', icon: 'rain' },
    71: { desc: '小雪', icon: 'snow' },
    73: { desc: '中雪', icon: 'snow' },
    75: { desc: '大雪', icon: 'snow' },
    80: { desc: '阵雨', icon: 'rain' },
    81: { desc: '中阵雨', icon: 'rain' },
    82: { desc: '大阵雨', icon: 'rain' },
    95: { desc: '雷暴', icon: 'thunder' },
    96: { desc: '雷暴伴冰雹', icon: 'thunder' },
    99: { desc: '强雷暴', icon: 'thunder' }
  };

  const weatherEmojis = {
    'sunny': '☀️',
    'moon': '🌙',
    'partly-cloudy': '⛅',
    'moon-cloudy': '☁️',
    'cloudy': '☁️',
    'fog': '🌫️',
    'drizzle': '🌦️',
    'rain': '🌧️',
    'snow': '❄️',
    'thunder': '⛈️'
  };

  function getWeatherEmoji(code, isNight) {
    const info = weatherCodes[code] || { desc: '未知', icon: 'sunny' };
    let icon = info.icon;
    if (isNight && icon === 'sunny') icon = 'moon';
    if (isNight && icon === 'partly-cloudy') icon = 'moon-cloudy';
    return weatherEmojis[icon] || '🌤️';
  }

  function getWindDirection(deg) {
    const directions = ['北风', '东北风', '东风', '东南风', '南风', '西南风', '西风', '西北风'];
    const index = Math.round(deg / 45) % 8;
    return directions[index];
  }

  function getAQILevel(aqi) {
    if (aqi <= 50) return { label: '优', percent: (aqi / 50) * 25 };
    if (aqi <= 100) return { label: '良', percent: 25 + ((aqi - 50) / 50) * 25 };
    if (aqi <= 150) return { label: '轻度污染', percent: 50 + ((aqi - 100) / 50) * 25 };
    if (aqi <= 200) return { label: '中度污染', percent: 75 + ((aqi - 150) / 50) * 25 };
    return { label: '重度污染', percent: 100 };
  }

  function getUVLevel(uv) {
    if (uv <= 2) return { label: '低', percent: (uv / 2) * 20 };
    if (uv <= 5) return { label: '中等', percent: 20 + ((uv - 2) / 3) * 30 };
    if (uv <= 7) return { label: '高', percent: 50 + ((uv - 5) / 2) * 20 };
    if (uv <= 10) return { label: '很高', percent: 70 + ((uv - 7) / 3) * 25 };
    return { label: '极高', percent: 100 };
  }

  function updateTheme(weatherCode, isNight) {
    document.body.classList.remove(
      'weather-clear-day', 'weather-clear-night',
      'weather-cloudy-day', 'weather-cloudy-night',
      'weather-rain', 'weather-snow'
    );

    if (weatherCode >= 51 && weatherCode <= 67 || weatherCode >= 80 || weatherCode >= 95) {
      document.body.classList.add('weather-rain');
    } else if (weatherCode >= 71 && weatherCode <= 86) {
      document.body.classList.add('weather-snow');
    } else if ([0, 1].includes(weatherCode)) {
      document.body.classList.add(isNight ? 'weather-clear-night' : 'weather-clear-day');
    } else {
      document.body.classList.add(isNight ? 'weather-cloudy-night' : 'weather-cloudy-day');
    }
  }

  function isNightTime(sunrise, sunset) {
    const now = new Date();
    const sunriseTime = new Date(sunrise);
    const sunsetTime = new Date(sunset);
    return now < sunriseTime || now > sunsetTime;
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('statusTime').textContent = now.toLocaleTimeString('zh-CN', {
      hour: '2-digit',
      minute: '2-digit',
      hour12: false
    });
    updateGreeting(now);
  }

  function updateGreeting(now) {
    const hour = now.getHours();
    let title, sub;
    if (hour >= 5 && hour < 9) {
      title = '果果，早上好'; sub = '新的一天开始啦 ✨';
    } else if (hour >= 9 && hour < 12) {
      title = '果果，上午好'; sub = '今天也要元气满满哦 💪';
    } else if (hour >= 12 && hour < 14) {
      title = '果果，中午好'; sub = '记得吃午饭哦 🍚';
    } else if (hour >= 14 && hour < 18) {
      title = '果果，下午好'; sub = '下午茶时间到啦 🍰';
    } else if (hour >= 18 && hour < 22) {
      title = '果果，晚上好'; sub = '今天过得怎么样呀 🌆';
    } else {
      title = '果果，夜深了'; sub = '早点休息，做个好梦 🌙';
    }
    document.getElementById('greetingText').textContent = title;
    document.getElementById('greetingSub').textContent = sub;
  }

  function formatTime(date) {
    const d = new Date(date);
    return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function formatHour(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleTimeString('zh-CN', { hour: '2-digit', hour12: false });
  }

  function getDayName(offset) {
    const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
    const today = new Date();
    const target = new Date(today);
    target.setDate(today.getDate() + offset);
    const dayOfWeek = days[target.getDay()];
    if (offset === 0) return '今天';
    if (offset === 1) return '明天';
    return dayOfWeek;
  }

  function renderHourlyForecast(hourly, isNight) {
    const container = document.getElementById('hourlyScroll');
    container.innerHTML = '';

    const now = new Date();
    const startIdx = hourly.time.findIndex(t => new Date(t) >= now);
    if (startIdx < 0) return;

    const count = Math.min(12, hourly.time.length - startIdx);
    for (let i = 0; i < count; i++) {
      const idx = startIdx + i;
      const time = new Date(hourly.time[idx]);
      const code = hourly.weather_code[idx];
      const temp = Math.round(hourly.temperature_2m[idx]);
      const precip = hourly.precipitation_probability[idx] || 0;
      const hourIsNight = time.getHours() < 6 || time.getHours() >= 19;
      const isCurrentHour = i === 0;

      if (i > 0) {
        const divider = document.createElement('div');
        divider.className = 'hour-divider';
        container.appendChild(divider);
      }

      const item = document.createElement('div');
      item.className = 'hour-item' + (isCurrentHour ? ' current' : '');
      item.innerHTML = `
        <div class="hour-time">${isCurrentHour ? '现在' : formatHour(hourly.time[idx])}</div>
        <div class="hour-icon">${getWeatherEmoji(code, hourIsNight && isNight)}</div>
        <div class="hour-temp">${temp}°</div>
        <div class="hour-precip">${precip > 0 ? precip + '%' : ''}</div>
      `;
      container.appendChild(item);
    }
  }

  function renderDailyForecast(daily, isNight) {
    const container = document.getElementById('dailyList');
    container.innerHTML = '';

    if (!daily || !daily.time || daily.time.length < 2) return;

    let allTemps = [];
    for (let i = 0; i < daily.time.length; i++) {
      allTemps.push(daily.temperature_2m_min[i]);
      allTemps.push(daily.temperature_2m_max[i]);
    }
    const tempMin = Math.min(...allTemps);
    const tempMax = Math.max(...allTemps);
    const tempRange = tempMax - tempMin || 1;

    const daysToShow = Math.min(7, daily.time.length);
    for (let i = 0; i < daysToShow; i++) {
      const code = daily.weather_code[i];
      const tempMaxDay = Math.round(daily.temperature_2m_max[i]);
      const tempMinDay = Math.round(daily.temperature_2m_min[i]);
      const precip = daily.precipitation_probability_max[i] || 0;

      const leftPercent = ((tempMinDay - tempMin) / tempRange) * 100;
      const widthPercent = ((tempMaxDay - tempMinDay) / tempRange) * 100;

      const row = document.createElement('div');
      row.className = 'daily-row';
      row.innerHTML = `
        <div class="daily-day">${getDayName(i)}</div>
        <div class="daily-icon">${getWeatherEmoji(code, false)}</div>
        <div class="daily-precip">${precip > 0 ? precip + '%' : ''}</div>
        <div class="daily-temp-bar-container">
          <div class="daily-low-temp">${tempMinDay}°</div>
          <div class="temp-bar-wrapper">
            <div class="temp-bar" style="left: ${leftPercent}%; width: ${widthPercent}%;"></div>
          </div>
          <div class="daily-high-temp">${tempMaxDay}°</div>
        </div>
      `;
      container.appendChild(row);
    }
  }

  function updateSunArc(sunrise, sunset) {
    const now = new Date();
    const sunriseTime = new Date(sunrise);
    const sunsetTime = new Date(sunset);

    const dayLengthMs = sunsetTime - sunriseTime;
    const elapsedMs = now - sunriseTime;
    let progress = 0;
    if (now <= sunriseTime) {
      progress = 0;
    } else if (now >= sunsetTime) {
      progress = 1;
    } else {
      progress = elapsedMs / dayLengthMs;
    }

    const arcPath = document.getElementById('sunArcDay');
    const sunDot = document.getElementById('sunDot');

    const x1 = 5, y1 = 35;
    const cx = 60, cy = -10;
    const x2 = 115, y2 = 35;

    const t = progress;
    const x = (1 - t) * (1 - t) * x1 + 2 * (1 - t) * t * cx + t * t * x2;
    const y = (1 - t) * (1 - t) * y1 + 2 * (1 - t) * t * cy + t * t * y2;

    sunDot.setAttribute('cx', x);
    sunDot.setAttribute('cy', y);

    const numPoints = 50;
    let pathD = `M ${x1} ${y1}`;
    for (let i = 1; i <= numPoints * progress; i++) {
      const tt = i / numPoints;
      const xx = (1 - tt) * (1 - tt) * x1 + 2 * (1 - tt) * tt * cx + tt * tt * x2;
      const yy = (1 - tt) * (1 - tt) * y1 + 2 * (1 - tt) * tt * cy + tt * tt * y2;
      pathD += ` L ${xx} ${yy}`;
    }
    arcPath.setAttribute('d', pathD);
  }

  function showError(msg) {
    const toast = document.getElementById('errorToast');
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 3000);
  }

  async function fetchWeatherData() {
    try {
      const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${LOCATION_LAT}&longitude=${LOCATION_LON}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,surface_pressure,cloud_cover,dew_point_2m&hourly=temperature_2m,precipitation_probability,weather_code,visibility,uv_index&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset&forecast_days=7&timezone=auto`;

      const aqiUrl = `https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${LOCATION_LAT}&longitude=${LOCATION_LON}&current=us_aqi,pm2_5,pm10&timezone=auto`;

      const [weatherRes, aqiRes] = await Promise.all([
        fetch(weatherUrl),
        fetch(aqiUrl).catch(() => null)
      ]);

      const weatherData = await weatherRes.json();
      const aqiData = aqiRes && aqiRes.ok ? await aqiRes.json() : null;

      if (!weatherData.current) {
        throw new Error('天气数据异常');
      }

      updateUI(weatherData, aqiData);
    } catch (err) {
      console.error('获取天气失败:', err);
      showError('加载天气失败，请稍后重试');
    } finally {
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }
  }

  function updateUI(weatherData, aqiData) {
    const current = weatherData.current;
    const hourly = weatherData.hourly;
    const daily = weatherData.daily;

    const sunrise = daily.sunrise[0];
    const sunset = daily.sunset[0];
    const isNight = isNightTime(sunrise, sunset);
    const weatherCode = current.weather_code;

    updateTheme(weatherCode, isNight);

    document.getElementById('currentTemp').textContent = Math.round(current.temperature_2m);
    document.getElementById('weatherDesc').textContent = weatherCodes[weatherCode]?.desc || '未知';
    document.getElementById('todayHigh').textContent = Math.round(daily.temperature_2m_max[0]) + '°';
    document.getElementById('todayLow').textContent = Math.round(daily.temperature_2m_min[0]) + '°';

    document.getElementById('humidity').textContent = Math.round(current.relative_humidity_2m);
    document.getElementById('windSpeed').textContent = Math.round(current.wind_speed_10m);
    document.getElementById('windDirection').textContent = getWindDirection(current.wind_direction_10m);
    document.getElementById('pressure').textContent = Math.round(current.surface_pressure);
    document.getElementById('dewPoint').textContent = Math.round(current.dew_point_2m);

    const now = new Date();
    const currentHourIdx = hourly.time.findIndex(t => new Date(t).getHours() === now.getHours() && new Date(t).getDate() === now.getDate());
    if (currentHourIdx >= 0) {
      const visibility = hourly.visibility[currentHourIdx];
      document.getElementById('visibility').textContent = visibility ? (visibility / 1000).toFixed(1) : '--';
      const uv = hourly.uv_index[currentHourIdx];
      document.getElementById('uvValue').textContent = uv ? Math.round(uv) : '--';
      if (uv != null) {
        const uvLevel = getUVLevel(uv);
        document.getElementById('uvLevel').textContent = uvLevel.label;
        document.getElementById('uvBar').style.width = uvLevel.percent + '%';
      }
    }

    document.getElementById('sunriseTime').textContent = formatTime(sunrise);
    document.getElementById('sunsetTime').textContent = formatTime(sunset);
    updateSunArc(sunrise, sunset);

    if (aqiData && aqiData.current) {
      const aqi = aqiData.current.us_aqi;
      document.getElementById('aqiValue').textContent = Math.round(aqi);
      const aqiLevel = getAQILevel(aqi);
      document.getElementById('aqiLabel').textContent = aqiLevel.label;
      document.getElementById('aqiBar').style.width = aqiLevel.percent + '%';
      document.getElementById('pm25Value').textContent = Math.round(aqiData.current.pm2_5);
      document.getElementById('pm10Value').textContent = Math.round(aqiData.current.pm10);
    }

    renderHourlyForecast(hourly, isNight);
    renderDailyForecast(daily, isNight);
  }

  updateClock();
  setInterval(updateClock, 1000);
  fetchWeatherData();

  let lastRefresh = 0;
  document.addEventListener('click', function(e) {
    const now = Date.now();
    if (now - lastRefresh < 3000) return;
    if (e.target.closest('.weather-card') || e.target.closest('.grid-card')) {
      lastRefresh = now;
      fetchWeatherData();
    }
  });
</script>
</body>
</html>
